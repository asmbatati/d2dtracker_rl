# Stage 2: low-level body-rate interception, trained with SAC (off-policy,
# sample-efficient for the slow single-instance PX4-in-the-loop sim).
env:
  world: default
  interceptor_entity: x500_d435_0
  target_entity: x3_uav_1
  interceptor_spawn: [0.0, 0.0, 0.0]
  target_spawn: [10.0, 0.0, 0.0]
  control_rate_hz: 20.0
  max_episode_steps: 400
  capture_radius: 1.0
  target_altitude: 4.0
  r_max: 3.0
  w_effort: 0.05
  target_policy: constant_velocity
  target_policy_params:
    velocity: [0.8, 0.0, 0.0]
  use_teleport: true

algo:
  name: SAC
  total_timesteps: 300000
  learning_rate: 0.0003
  buffer_size: 1000000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
